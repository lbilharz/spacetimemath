name: iOS Release

on:
  push:
    tags:
      - 'v*'   # trigger on version tags: git tag v1.0.1 && git push --tags

  # Allow manual trigger from GitHub UI with choice of lane
  workflow_dispatch:
    inputs:
      lane:
        description: 'Fastlane lane to run'
        required: true
        default: 'beta'
        type: choice
        options:
          - beta        # build + TestFlight only
          - metadata    # push metadata + screenshots, no binary
          - release     # full: screenshots + metadata + build + submit

jobs:
  ios:
    name: ${{ github.event_name == 'workflow_dispatch' && inputs.lane || 'beta' }}
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Build web assets
        run: npm run build
        working-directory: client

      - name: Sync Capacitor
        run: npx cap sync ios
        working-directory: client

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: client/ios/App

      - name: Install Fastlane
        run: bundle install
        working-directory: client/ios/App

      # App Store Connect API key — stored as GitHub secret, base64-encoded .p8 file
      - name: Write ASC API key
        run: |
          mkdir -p ~/.private_keys
          echo "${{ secrets.ASC_API_KEY_CONTENT }}" | base64 --decode \
            > ~/.private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}

      # Cache SPM checkouts — keyed on Package.resolved so cache invalidates on version bumps
      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('client/ios/App/App.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      # Pre-resolve SPM packages as a separate visible step before Fastlane.
      # capacitor-swift-pm contains binary XCFrameworks that can be slow to download;
      # doing this here gives us a clear failure point and its own timeout.
      - name: Resolve SPM packages
        run: xcodebuild -resolvePackageDependencies -scheme App -project App.xcodeproj
        working-directory: client/ios/App
        timeout-minutes: 15

      # Authenticate git for match ONLY — scoped to lbilharz/ so SPM public repos are unaffected
      - name: Authenticate git for match
        run: |
          git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/lbilharz/".insteadOf "https://github.com/lbilharz/"

      - name: Run Fastlane
        run: bundle exec fastlane ${{ github.event_name == 'workflow_dispatch' && inputs.lane || 'beta' }}
        working-directory: client/ios/App
        env:
          APP_STORE_CONNECT_API_KEY_KEY_ID:    ${{ secrets.ASC_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY:       ${{ secrets.ASC_API_KEY_CONTENT }}
          MATCH_PASSWORD:                      ${{ secrets.MATCH_PASSWORD }}
