<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark navy background with rounded corners -->
  <rect width="100" height="100" rx="22" fill="#0d0d1a"/>
  <!-- Subtle radial glow -->
  <radialGradient id="g" cx="50%" cy="55%" r="45%">
    <stop offset="0%" stop-color="#00d4aa" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#00d4aa" stop-opacity="0"/>
  </radialGradient>
  <rect width="100" height="100" rx="22" fill="url(#g)"/>
  <!-- Shadow bolt (depth effect) -->
  <polygon points="57,10 23,58 43,58 35,90 73,42 53,42" fill="#005544" transform="translate(3,3)"/>
  <!-- Main teal bolt -->
  <polygon points="57,10 23,58 43,58 35,90 73,42 53,42" fill="#00d4aa"/>
</svg>
